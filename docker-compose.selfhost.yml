services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 10000
      BASE_URL: https://${APP_DOMAIN}
      CANONICAL_HOST: ${APP_DOMAIN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://${APP_DOMAIN}}
      SYNC_TOKEN: ${SYNC_TOKEN}
      STP_CONTRACT_ADDRESS: ${STP_CONTRACT_ADDRESS:-Pending mainnet deployment}
      DATA_DIR: /app/data
    volumes:
      - stampcoin_data:/app/data
    expose:
      - "10000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const req = require('http').request({ host: '127.0.0.1', port: 10000, path: '/health', headers: { Host: process.env.CANONICAL_HOST } }, res => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.end();\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  caddy:
    image: caddy:2.10
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  stampcoin_data:
  caddy_data:
  caddy_config:
