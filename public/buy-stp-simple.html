<!DOCTYPE html>
<html>
<head>
    <title>Buy STP - Simple</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; direction: rtl; }
        input, button { padding: 10px; margin: 10px; font-size: 16px; }
        button { background: #ff6b35; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>💰 شراء عملات STP</h1>
    <p>العقد: <code>0xd8b934580fcE35a11B58C6D73aDeE468a2833fa8</code></p>
    <p>السعر: <strong>0.4 ETH</strong> لكل STP</p>
    
    <input type="number" id="amount" placeholder="المبلغ بـ ETH" step="0.1" value="0.1">
    <button onclick="buy()">شراء</button>
    
    <div id="result"></div>

    <script>
        const contractAddress = "0xd8b934580fcE35a11B58C6D73aDeE468a2833fa8";
        const abi = ["function buyTokens() external payable"];
        
        async function buy() {
            const amount = document.getElementById('amount').value;
            if (!amount || amount <= 0) {
                document.getElementById('result').innerHTML = '<p class="error">الرجاء إدخال مبلغ صحيح</p>';
                return;
            }
            
            if (!window.ethereum) {
                document.getElementById('result').innerHTML = '<p class="error">الرجاء تثبيت MetaMask</p>';
                return;
            }
            
            try {
                const web3 = new Web3(window.ethereum);
                const accounts = await web3.eth.requestAccounts();
                const contract = new web3.eth.Contract(abi, contractAddress);
                
                document.getElementById('result').innerHTML = '<p>جاري معالجة الطلب...</p>';
                
                const tx = await contract.methods.buyTokens().send({
                    from: accounts[0],
                    value: web3.utils.toWei(amount, 'ether')
                });
                
                document.getElementById('result').innerHTML = `<p class="success">✅ تم الشراء بنجاح!<br>معاملة: ${tx.transactionHash}</p>`;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p class="error">❌ فشل الشراء: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
