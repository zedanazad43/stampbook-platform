# =============================================================================
# 🏷 StampCoin Platform - Fly.io Production Configuration v2.0
# 📅 آخر تحديث: مارس 2026
# 👤 المطور: Azad Zedan | 🌐 ecostamp.net
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# 📋 المعلومات الأساسية للتطبيق
# ─────────────────────────────────────────────────────────────────────────────
app = "ecostamp-api"
primary_region = "fra"  # Frankfurt, EU (الأقرب للمستخدمين العرب والأوروبيين)

# المناطق الإضافية للتوسع العالمي (تُفعّل عند الحاجة)
# [[regions]]
# code = "ams"  # Amsterdam
# [[regions]]
# code = "lhr"  # London
# [[regions]]
# code = "iad"  # Washington DC (للولايات المتحدة)
# [[regions]]
# code = "sin"  # Singapore (لآسيا)

# ─────────────────────────────────────────────────────────────────────────────
# 🔧 إعدادات البناء (Build)
# ─────────────────────────────────────────────────────────────────────────────
[build]
  dockerfile = "Dockerfile"
  # ignorefile = ".dockerignore"  # افتراضي

# ─────────────────────────────────────────────────────────────────────────────
# 🌐 إعدادات الخدمة (HTTP/HTTPS Service)
# ─────────────────────────────────────────────────────────────────────────────
[http_service]
  internal_port = 3000  # منفذ التطبيق الداخلي
  force_https = true    # إجبار جميع الطلبات على HTTPS
  auto_stop_machines = "stop"  # إيقاف الآلات غير النشطة لتوفير التكلفة
  auto_start_machines = true   # إعادة التشغيل التلقائي عند الطلب
  min_machines_running = 1     # الحد الأدنى للآلات النشطة (للتوفر العالي)
  max_machines_running = 3     # الحد الأقصى للتوسع التلقائي
  
  # إعدادات التوسع التلقائي (Autoscaling)
  [http_service.concurrency]
    type = "requests"
    hard_limit = 100    # الحد الأقصى للطلبات المتزامنة لكل آلة
    soft_limit = 75     # الحد الذي يبدأ عنده التوسع
  
  # فحوصات الصحة (Health Checks)
  [[http_service.checks]]
    grace_period = "30s"      # مهلة قبل بدء الفحص بعد التشغيل
    interval = "15s"          # تكرار الفحص
    method = "GET"
    timeout = "5s"
    path = "/api/health"      # نقطة فحص الصحة
    protocol = "https"
    tls_skip_verify = false
  
  # توجيه المسارات (Routing)
  [[http_service.routes]]
    pattern = "/api/stripe/*"
    handlers = ["api"]  # توجيه معاملات الدفع لمسار مخصص
  
  [[http_service.routes]]
    pattern = "/api/trpc/*"
    handlers = ["api"]  # توجيه طلبات tRPC
  
  [[http_service.routes]]
    pattern = "/api/oauth/*"
    handlers = ["api"]  # توجيه مصادقة OAuth
  
  [[http_service.routes]]
    pattern = "/static/*"
    handlers = ["static"]  # الملفات الثابتة (يمكن توجيهها لـ CDN)
  
  [[http_service.routes]]
    pattern = "*"
    handlers = ["api"]  # المسار الافتراضي

# ─────────────────────────────────────────────────────────────────────────────
# 💾 التخزين الدائم (Persistent Volumes)
# ─────────────────────────────────────────────────────────────────────────────
[mounts]
  source = "stampcoin_data"  # اسم الحجم في Fly.io
  destination = "/app/data"  # مسار الربط داخل الحاوية
  # initial_size = "3GB"     # الحجم الأولي (يُضبط عند الإنشاء)

# ─────────────────────────────────────────────────────────────────────────────
# ⚙️ متغيرات البيئة (Environment Variables)
# ─────────────────────────────────────────────────────────────────────────────
[env]
  # ── بيئة التشغيل ──
  NODE_ENV = "production"
  PORT = "3000"
  
  # ── قاعدة البيانات ──
  # ملاحظة: القيم الحساسة تُضاف عبر: flyctl secrets set KEY=VALUE
  DATABASE_URL = "mysql://stampcoin_user:stampcoin_pass@mysql:3306/stampcoin"
  DB_POOL_MIN = "2"
  DB_POOL_MAX = "10"
  
  # ── الأمان والمصادقة ──
  JWT_SECRET = "${JWT_SECRET}"  # يُضبط كـ secret
  JWT_EXPIRY = "24h"
  SESSION_SECRET = "${SESSION_SECRET}"
  
  # ── OAuth / OpenID Connect ──
  OAUTH_SERVER_URL = "https://auth.ecostamp.net"
  VITE_OAUTH_PORTAL_URL = "https://portal.ecostamp.net"
  VITE_APP_ID = "ecostamp_prod_2026"
  OWNER_OPEN_ID = "${OWNER_OPEN_ID}"  # معرف المسؤول
  
  # ── Stripe للمدفوعات ──
  STRIPE_SECRET_KEY = "${STRIPE_SECRET_KEY}"
  STRIPE_PUBLISHABLE_KEY = "${STRIPE_PUBLISHABLE_KEY}"
  STRIPE_WEBHOOK_SECRET = "${STRIPE_WEBHOOK_SECRET}"
  STRIPE_CURRENCY = "eur"  # العملة الأساسية: يورو
  
  # ── العملات المدعومة (7 عملات رئيسية) ──
  SUPPORTED_CURRENCIES = "USD,EUR,GBP,SAR,AED,TRY,CNY"
  DEFAULT_CURRENCY = "EUR"
  CURRENCY_RATES_API = "https://api.exchangerate.host"  # تحديث أسعار الصرف
  
  # ── دعم اللغات العالمية (7 لغات) ──
  SUPPORTED_LANGUAGES = "ar,en,es,zh,de,fr,tr"
  DEFAULT_LANGUAGE = "en"
  FALLBACK_LANGUAGE = "en"
  RTL_LANGUAGES = "ar"  # اللغات ذات الاتجاه من اليمين لليسار
  
  # ── العقد الذكي والبلوكشين ──
  STP_CONTRACT_ADDRESS = "${STP_CONTRACT_ADDRESS}"  # عنوان عقد StampCoin
  STP_CONTRACT_NETWORK = "polygon"  # الشبكة: polygon, ethereum, bsc
  STP_RPC_ENDPOINT = "${STP_RPC_ENDPOINT}"  # نقطة اتصال RPC
  STP_EXPLORER_URL = "https://polygonscan.com"  # رابط المستكشف
  
  # ── طرح العملة في السوق (Token Launch) ──
  TOKEN_LAUNCH_STATUS = "pre-sale"  # الحالات: planning, pre-sale, live, completed
  TOKEN_INITIAL_SUPPLY = "100000000"  # 100 مليون عملة
  TOKEN_DECIMALS = "18"  # عدد الخانات العشرية
  TOKEN_VESTING_ENABLED = true
  TOKEN_LIQUIDITY_LOCKED = true
  
  # ── التسويق الذكي وتحليلات الحملات ──
  MARKETING_MODE = "smart"  # modes: basic, smart, aggressive
  ANALYTICS_ENABLED = true
  GOOGLE_ANALYTICS_ID = "${GA_MEASUREMENT_ID}"
  FACEBOOK_PIXEL_ID = "${FB_PIXEL_ID}"
  TRACKING_CONSENT_REQUIRED = true  # الامتثال لـ GDPR
  
  # ── حملات الدعاية والإعلان ──
  CAMPAIGN_ENGINE_ENABLED = true
  AD_NETWORKS = "google,meta,tiktok"  # شبكات الإعلان المدعومة
  BUDGET_DAILY_LIMIT = "100"  # الحد اليومي للميزانية (بالدولار)
  ROI_TARGET = "3.0"  # هدف العائد على الاستثمار: 300%
  
  # ── نظام الإحالة والولاء ──
  REFERRAL_ENABLED = true
  REFERRAL_BONUS_PERCENT = "10"  # مكافأة 10% للمحيل والمحال
  LOYALTY_POINTS_ENABLED = true
  POINTS_PER_DOLLAR = "10"  # 10 نقاط لكل دولار
  
  # ── Forge API لتخزين الصور والطوابع ──
  BUILT_IN_FORGE_API_URL = "${BUILT_IN_FORGE_API_URL}"
  BUILT_IN_FORGE_API_KEY = "${BUILT_IN_FORGE_API_KEY}"
  FORGE_MAX_FILE_SIZE = "10MB"
  FORGE_ALLOWED_TYPES = "image/png,image/jpeg,image/webp,image/svg+xml"
  
  # ── Redis للتخزين المؤقت (اختياري) ──
  REDIS_URL = "${REDIS_URL}"  # redis://redis:6379
  CACHE_TTL_DEFAULT = "3600"  # 1 ساعة بالثواني
  
  # ── إعدادات البريد الإلكتروني ──
  SMTP_HOST = "${SMTP_HOST}"
  SMTP_PORT = "587"
  SMTP_USER = "${SMTP_USER}"
  SMTP_PASS = "${SMTP_PASS}"
  EMAIL_FROM = "noreply@ecostamp.net"
  EMAIL_SUPPORT = "support@ecostamp.net"
  
  # ── حدود المعدل (Rate Limiting) ──
  RATE_LIMIT_WINDOW = "60"  # النافذة الزمنية بالثواني
  RATE_LIMIT_MAX_REQUESTS = "100"  # الحد الأقصى للطلبات
  RATE_LIMIT_API = "200"  # حد أعلى لـ API
  
  # ── المراقبة والتسجيل ──
  LOG_LEVEL = "info"  # levels: debug, info, warn, error
  SENTRY_DSN = "${SENTRY_DSN}"  # لتتبع الأخطاء
  UPTIME_MONITOR_URL = "https://api.ecostamp.net/api/health"

# ─────────────────────────────────────────────────────────────────────────────
# 🔄 استراتيجية النشر (Deploy Strategy)
# ─────────────────────────────────────────────────────────────────────────────
[deploy]
  strategy = "rolling"  # تحديث تدريجي بدون توقف
  # بديل: "bluegreen" للتحديث بدون أي توقف (يتطلب آلة إضافية)
  max_unavailable = 1  # الحد الأقصى للآلات غير المتاحة أثناء التحديث

# ─────────────────────────────────────────────────────────────────────────────
# 🩺 فحوصات الصحة المتقدمة (Advanced Health Checks)
# ─────────────────────────────────────────────────────────────────────────────
[checks]
  [checks.health]
    port = 3000
    type = "http"
    interval = "30s"
    timeout = "5s"
    path = "/api/health"
    protocol = "https"
  
  [checks.database]
    port = 3000
    type = "http"
    interval = "60s"
    timeout = "10s"
    path = "/api/health/db"
    protocol = "https"
  
  [checks.stripe]
    port = 3000
    type = "http"
    interval = "120s"
    timeout = "10s"
    path = "/api/health/stripe"
    protocol = "https"

# ─────────────────────────────────────────────────────────────────────────────
# 📊 الموارد والحدود (Resource Limits)
# ─────────────────────────────────────────────────────────────────────────────
[resources]
  # يمكن تحديدها لكل آلة في flyctl machine update
  # cpu_kind = "shared"  # أو "performance"
  # cpus = 1
  # memory_mb = 1024

# ─────────────────────────────────────────────────────────────────────────────
# 🔄 إدارة الآلات (Machine Management)
# ─────────────────────────────────────────────────────────────────────────────
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
  # للتوسع: [[vm]] مع cpu_kind = "performance" للآلات الثقيلة

# ─────────────────────────────────────────────────────────────────────────────
# 🔐 إعدادات الأمان الإضافية (Security Headers via App Code)
