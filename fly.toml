#   Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ─────────────────────────────────────────────────────────────────────────────
# 📦 عمليات ما بعد النشر (Post-Deploy Hooks)
# ملاحظة: تُنفّذ عبر GitHub Actions أو سكربت محلي
# ─────────────────────────────────────────────────────────────────────────────
# [processes]
#   app = "node dist/index.js"
#   worker = "node dist/worker.js"  # للمهام الخلفية
#   scheduler = "node dist/scheduler.js"  # للمهام المجدولة

# ─────────────────────────────────────────────────────────────────────────────
# 🌍 إعدادات Cloudflare Proxy (تُضبط في لوحة Cloudflare)
# ─────────────────────────────────────────────────────────────────────────────
# DNS Records المطلوبة:
#   CNAME | api.ecostamp.net | ecostamp-api.fly.dev | 🟠 Proxied
#   CNAME | ecostamp.net | ecostamp.pages.dev | 🟠 Proxied
#   
# SSL/TLS Mode: Full (strict)
# Page Rules:
#   api.ecostamp.net/* → Cache Level: Bypass
#   ecostamp.net/* → Cache Level: Standard

# ─────────────────────────────────────────────────────────────────────────────
# 📈 إعدادات المراقبة والتحليلات (Monitoring & Analytics)
# ─────────────────────────────────────────────────────────────────────────────
# أدوات موصى بها:
#   • UptimeRobot: لمراقبة التوفر (مجاني)
#   • Sentry: لتتبع الأخطاء (خطة مجانية)
#   • Google Analytics 4: لتحليلات المستخدمين
#   • Stripe Dashboard: لمراقبة الإيرادات
#   • Fly.io Metrics: لمراقبة الأداء التقني

# ─────────────────────────────────────────────────────────────────────────────
# 💰 خطة تكنومكس الاقتصادية - إعدادات التطبيق
# ─────────────────────────────────────────────────────────────────────────────
# هيكلية الخطط (تُدار عبر Stripe Products):
#   • Free: $0/شهر - 10 طوابع، ميزات أساسية
#   • Starter: $4.99/شهر - 100 طابع، دعم أولوي
#   • Pro: $14.99/شهر - غير محدود، API Access، تكامل Forge
#   • Enterprise: $49.99/شهر - ميزات مخصصة، SLA 99.9%
#   • Lifetime: $299 (مرة واحدة) - وصول مدى الحياة لخطة Pro

# نظام النقاط والولاء:
#   • التسجيل: +100 نقطة
#   • أول طابع: +50 نقطة
#   • النشاط الشهري: +25 نقطة
#   • الإحالة: +200 نقطة لكلا الطرفين
#   • الترقية: +500 نقطة
#   
# مستويات الولاء:
#   • Bronze: 0+ نقطة - خصم 0%
#   • Silver: 500+ نقطة - خصم 5%
#   • Gold: 2000+ نقطة - خصم 10%
#   • Platinum: 5000+ نقطة - خصم 15%

# ─────────────────────────────────────────────────────────────────────────────
# 🪙 إعدادات العملة الرقمية StampCoin (STP)
# ─────────────────────────────────────────────────────────────────────────────
# تفاصيل العقد الذكي:
#   • الشبكة: Polygon (لرسوم منخفضة وسرعة عالية)
#   • العنوان: يُضبط عبر STP_CONTRACT_ADDRESS
#   • المعيار: ERC-20
#   • العرض الكلي: 100,000,000 STP
#   • الخانات العشرية: 18
#   
# توزيع العملة:
#   • 40% - مبيعات عامة (Public Sale)
#   • 20% - فريق التطوير (مقفل 24 شهر)
#   • 15% - صندوق التسويق والنمو
#   • 15% - مكافآت المجتمع والإحالة
#   • 10% - السيولة الأولية (مقفل 12 شهر)
#   
# الجدول الزمني للإطلاق:
#   • المرحلة 1: Pre-sale (للمستثمرين المبكرين)
#   • المرحلة 2: Public Sale (عبر موقع ecostamp.net)
#   • المرحلة 3: DEX Listing (Uniswap, QuickSwap)
#   • المرحلة 4: CEX Applications (Binance, Coinbase)

# ─────────────────────────────────────────────────────────────────────────────
# 🎯 التسويق الذكي - إعدادات الحملات
# ─────────────────────────────────────────────────────────────────────────────
# قنوات الإعلان المدعومة:
#   • Google Ads: بحث، عرض، يوتيوب
#   • Meta Ads: فيسبوك، إنستغرام
#   • TikTok Ads: للمستخدمين الشباب
#   • Twitter/X Ads: للمجتمع التقني
#   
# استهداف ذكي:
#   • حسب اللغة: عرض الإعلانات بلغة المستخدم
#   • حسب المنطقة: عروض مخصصة لكل سوق
#   • حسب السلوك: إعادة استهداف الزوار المهتمين
#   
# قياس الأداء:
#   • CPA (Cost Per Acquisition): هدف <$5 للمستخدم الجديد
#   • ROAS (Return On Ad Spend): هدف >300%
#   • LTV (Lifetime Value): تتبع قيمة المستخدم على المدى الطويل

# ─────────────────────────────────────────────────────────────────────────────
# 🛡️ الامتثال والخصوصية (Compliance)
# ─────────────────────────────────────────────────────────────────────────────
# متطلبات قانونية:
#   • GDPR: لمستخدمي الاتحاد الأوروبي
#   • CCPA: لمستخدمي كاليفورنيا
#   • PCI-DSS: لمعالجة المدفوعات عبر Stripe
#   
# إعدادات الخصوصية:
#   • موافقة ملفات تعريف الارتباط: مطلوبة قبل التتبع
#   • حق النسيان: زر لحذف بيانات المستخدم
#   • تصدير البيانات: تمكين المستخدمين من تنزيل بياناتهم
#   • سياسة الخصوصية: صفحة مخصصة ومحدثة

# =============================================================================
# 📋 أوامر Fly.io المفيدة للإدارة
# =============================================================================
# 
# # عرض حالة التطبيق
# flyctl status -a ecostamp-api
# 
# # عرض السجلات الحية
# flyctl logs -a ecostamp-api
# 
# # إضافة متغير سري جديد
# flyctl secrets set -a ecostamp-api KEY_NAME="value"
# 
# # عرض جميع الأسرار (الأسماء فقط)
# flyctl secrets list -a ecostamp-api
# 
# # إعادة النشر مع بناء جديد
# flyctl deploy -a ecostamp-api --dockerfile Dockerfile
# 
# # التوسع اليدوي: إضافة آلة جديدة
# flyctl machine clone <machine-id> -a ecostamp-api --region ams
# 
# # فحص الصحة يدوياً
# flyctl health checks -a ecostamp-api
# 
# # إيقاف التطبيق مؤقتاً
# flyctl machines stop --all -a ecostamp-api
# 
# # عرض استخدام الموارد
# flyctl apps list -a ecostamp-api --json
# 
# =============================================================================
# 🚀 خطوات النشر النهائية
# =============================================================================
# 
# 1. إنشاء التطبيق (إذا لم يكن موجوداً):
#    flyctl launch --name ecostamp-api --region fra --copy-config
# 
# 2. إنشاء حجم التخزين الدائم:
#    flyctl volumes create stampcoin_data --size 3 --region fra
# 
# 3. إضافة جميع المتغيرات السرية:
#    flyctl secrets set -a ecostamp-api \
#      JWT_SECRET="$(openssl rand -hex 64)" \
#      DATABASE_URL="mysql://user:pass@host:3306/stampcoin" \
#      STRIPE_SECRET_KEY="sk_live_..." \
#      STRIPE_WEBHOOK_SECRET="whsec_..." \
#      STP_CONTRACT_ADDRESS="0x..." \
#      SENTRY_DSN="https://..."
# 
# 4. النشر الأولي:
#    flyctl deploy -a ecostamp-api --dockerfile Dockerfile
# 
# 5. التحقق من الصحة:
#    curl -s https://api.ecostamp.net/api/health
# 
# 6. إعداد Cloudflare DNS:
#    CNAME | api | ecostamp-api.fly.dev | 🟠 Proxied
# 
