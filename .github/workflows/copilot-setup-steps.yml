jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install MCP server packages
        run: |
          npm install --no-save \
            @modelcontextprotocol/server-filesystem \
            @modelcontextprotocol/server-github \
            @modelcontextprotocol/server-gitlab \
            @modelcontextprotocol/server-memory \
            @modelcontextprotocol/server-postgres \
            @modelcontextprotocol/server-sqlite \
            @cloudflare/mcp-server-cloudflare

      - name: Validate MCP configuration
        run: |
          node -e "
            const fs = require('fs');
            const files = [
              '.github/copilot/mcp.json',
              '.vscode/mcp.json',
              'mcp.json'
            ];
            let ok = true;
            files.forEach(f => {
              if (!fs.existsSync(f)) {
                console.error('MISSING:', f);
                ok = false;
                return;
              }
              try {
                JSON.parse(fs.readFileSync(f, 'utf8'));
                console.log('OK:', f);
              } catch (e) {
                console.error('INVALID JSON:', f, '-', e.message);
                ok = false;
              }
            });
            if (!ok) process.exit(1);
          "

      - name: Install dependencies (required)
        run: npm install --no-save \
          @modelcontextprotocol/server-filesystem \
          @modelcontextprotocol/server-github

      - name: Install private/optional MCP packages
        run: |
          npm install --no-save @modelcontextprotocol/server-sqlite || \
            echo "Skipping @modelcontextprotocol/server-sqlite (unavailable)"
          npm install --no-save @modelcontextprotocol/server-git || \
            echo "Skipping @modelcontextprotocol/server-git (unavailable)"
