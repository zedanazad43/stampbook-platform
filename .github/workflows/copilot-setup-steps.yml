# Copilot Setup Steps

name: Setup MCP Server

on:
  push:
    branches:
      - main

jobs:
  install:
    name: Install MCP Server Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install MCP server packages
        run: |
          npm install --no-save @modelcontextprotocol/server-setup
          npm install --no-save @modelcontextprotocol/server-env
          npm install --no-save @modelcontextprotocol/server-graphql
          npm install --no-save @modelcontextprotocol/server-signal
          npm install --no-save @modelcontextprotocol/server-setup-signal
          # Removed @modelcontextprotocol/server-fetch 
          npm install --no-save @modelcontextprotocol/server-metrics
          npm install --no-save @modelcontextprotocol/server-cache
      - name: Build project
        run: npm run build
