# Copilot Setup Steps for CI Automation
# This workflow is run by GitHub Copilot before every agent task to prepare the environment.
name: Copilot Setup Steps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "npm authentication configured via NODE_AUTH_TOKEN"
          else
            echo "NPM_TOKEN not set; skipping private registry authentication"
          fi

      - name: Install project dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Install required public MCP server packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          npm install --no-save \
            @modelcontextprotocol/server-filesystem \
            @modelcontextprotocol/server-github \
            @modelcontextprotocol/server-memory \
            @modelcontextprotocol/server-postgres \
            @modelcontextprotocol/server-sqlite \
            @cloudflare/mcp-server-cloudflare

      - name: Install optional or private MCP server packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install --no-save @modelcontextprotocol/server-git || \
            echo "Skipping @modelcontextprotocol/server-git (not available in registry)"
          npm install --no-save @modelcontextprotocol/server-gitlab || \
            echo "Skipping @modelcontextprotocol/server-gitlab (not available in registry)"

      - name: Validate MCP configuration
        run: |
          node -e "
            const fs = require('fs');
            const files = [
              '.github/copilot/mcp.json',
              '.vscode/mcp.json',
              'mcp.json'
            ];
            let ok = true;
            files.forEach(f => {
              if (!fs.existsSync(f)) {
                console.error('MISSING:', f);
                ok = false;
                return;
              }
              try {
                JSON.parse(fs.readFileSync(f, 'utf8'));
                console.log('OK:', f);
              } catch (e) {
                console.error('INVALID JSON:', f, '-', e.message);
                ok = false;
              }
            });
            if (!ok) process.exit(1);
          "

      - name: Install dependencies (Python)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests (Node.js)
        run: |
          if [ -f package.json ]; then
            npm test
          fi

      - name: Run tests (Python)
        run: |
          if [ -f requirements.txt ]; then
            pytest || echo "pytest not found"
          fi
