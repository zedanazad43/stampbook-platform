name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.COPILOT_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install project dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit
          elif [ -f package.json ]; then
            npm install --no-audit
          fi

      - name: Copilot setup complete
        run: echo 'Copilot setup steps completed!'
