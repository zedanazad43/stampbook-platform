name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # <-- Changed from 'read' to 'write' for checkout
    steps:
      - name: Checkout repository
        uses: - name: Checkout repository
  uses: actions/checkout@v4
  with:
    token: ${{ secrets.GITHUB_TOKEN }}
    fetch-depth: 0- name: Ensure main ref is available (for git diff/show)
  run: |
    git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
    git show-ref --verify --quiet refs/remotes/origin/main
    # اختياري: إنشاء ref محلي باسم main إذا كان شيء يتوقع refs/heads/main
    git branch -f main refs/remotes/origin/main
       
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install project dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Copilot setup complete
        run: echo 'Copilot setup steps completed!'
