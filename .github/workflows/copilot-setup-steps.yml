jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Configure npm auth token
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Install dependencies (required)
        run: npm install --no-save \
          @modelcontextprotocol/server-filesystem \
          @modelcontextprotocol/server-github

      - name: Install private/optional MCP packages
        run: |
          npm install --no-save @modelcontextprotocol/server-sqlite || \
            echo "Skipping @modelcontextprotocol/server-sqlite (unavailable)"
          npm install --no-save @modelcontextprotocol/server-git || \
            echo "Skipping @modelcontextprotocol/server-git (unavailable)"
