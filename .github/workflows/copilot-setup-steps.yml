name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure main ref is available (for git diff/show)
        run: |
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git branch -f main refs/remotes/origin/main 2>/dev/null || true
          else
            echo "Warning: refs/remotes/origin/main not found, skipping local ref creation"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install project dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Copilot setup complete
        run: echo 'Copilot setup steps completed!'
