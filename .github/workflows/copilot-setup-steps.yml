# Close stale issues and pull requests
- name: Close stale issues
  uses: actions/stale@v10.2.0
  with:
    # Token for the repository. Can be passed using `${{ secrets.GITHUB_TOKEN }}`.
    repo-token: # optional, defaults to ${{ github.token }}
    # Message to post when marking an issue as stale. If none, no issues will be marked stale.
    stale-issue-message: # optional
    # Message to post when marking a pull request as stale. If none, no pull requests will be marked stale.
    stale-pr-message: # optional
    # Message to post when closing an issue. If none, no comment will be posted when closing an issue.
    close-issue-message: # optional
    # Message to post when closing a pull request. If none, no comment will be posted when closing a pull request.
    close-pr-message: # optional
    # Number of days of inactivity before an issue or pull request becomes stale. Set to -1 to never mark as stale.
    days-before-stale: # optional, default is 60
    # Number of days of inactivity before an issue becomes stale. Overrides days-before-stale for issues.
    days-before-issue-stale: # optional
    # Number of days of inactivity before a pull request becomes stale. Overrides days-before-stale for PRs.
    days-before-pr-stale: # optional
    # Number of days to wait before closing a stale issue or pull request. Set to -1 to never close.
    days-before-close: # optional, default is 7
    # Number of days to wait before closing a stale issue. Overrides days-before-close for issues.
    days-before-issue-close: # optional
    # Number of days to wait before closing a stale pull request. Overrides days-before-close for PRs.
    days-before-pr-close: # optional
    # Label to apply when an issue is stale.
    stale-issue-label: # optional, default is Stale
    # Label to apply when closing an issue.
    close-issue-label: # optional
    # Labels that exempt an issue from being marked stale. Separate with commas (e.g., "label1,label2").
    exempt-issue-labels: # optional
    # Reason to use when closing an issue.
    close-issue-reason: # optional, default is not planned
    # Label to apply when a pull request is stale.
    stale-pr-label: # optional, default is Stale
    # Label to apply when closing a pull request.
    close-pr-label: # optional
    # Labels that exempt a pull request from being marked stale. Separate with commas (e.g., "label1,label2").
    exempt-pr-labels: # optional
    # Milestones that exempt an issue or pull request from being marked stale. Separate with commas.
    exempt-milestones: # optional
    # Milestones that exempt an issue from being marked stale. Overrides exempt-milestones for issues.
    exempt-issue-milestones: # optional
    # Milestones that exempt a pull request from being marked stale. Overrides exempt-milestones for PRs.
    exempt-pr-milestones: # optional
    # Exempt all issues and pull requests with milestones from being marked stale. Default is false.
    exempt-all-milestones: # optional, default is false
    # Exempt all issues with milestones from being marked stale. Overrides exempt-all-milestones for issues.
    exempt-all-issue-milestones: # optional
    # Exempt all pull requests with milestones from being marked stale. Overrides exempt-all-milestones for PRs.
    exempt-all-pr-milestones: # optional
    # Only issues or pull requests with all of these labels will be checked. Omit to check all.
    only-labels: # optional
    # Only issues with all of these labels will be checked. Overrides only-labels for issues.
    only-issue-labels: # optional
    # Only pull requests with all of these labels will be checked. Overrides only-labels for PRs.
    only-pr-labels: # optional
    # Maximum number of operations per run. Default is 30.
    operations-per-run: # optional, default is 30
    # Remove stale labels from issues and pull requests when they get new activity.
    remove-stale-when-updated: # optional, default is true
    # Remove the stale label from issues when they get new activity. Overrides remove-stale-when-updated for issues.
    remove-issue-stale-when-updated: # optional
    # Remove the stale label from pull requests when they get new activity. Overrides remove-stale-when-updated for PRs.
    remove-pr-stale-when-updated: # optional
    # Log output to debug.
    debug-only: # optional, default is false
    # Order to get issues/pull requests. Ascending or descending.
    ascending: # optional, default is false
    # Delete branch after closing a stale pull request.
    delete-branch: # optional, default is false
    # Start date for processing issues and pull requests.
    start-date: # optional
    # Labels on issues exempted from stale.
    exempt-draft-pr: # optional, default is false
    # Enable the stale action to process issues.
    enable-statistics: # optional, default is true
    # List of labels to add to an issue when it receives a new comment.
    labels-to-add-when-unstale: # optional
    # List of labels to remove from an issue when it receives a new comment.
    labels-to-remove-when-stale: # optional
    # List of labels to remove from an issue when it is marked as stale.
    labels-to-remove-when-unstale: # optional
    # Any time an issue or a PR has one of these assignees, it will be exempt.
    exempt-assignees: # optional
    # Any time an issue has one of these assignees, it will be exempt. Overrides exempt-assignees for issues.
    exempt-issue-assignees: # optional
    # Any time a pull request has one of these assignees, it will be exempt. Overrides exempt-assignees for PRs.
    exempt-pr-assignees: # optional
    # Exempt all issues and pull requests with assignees from being marked as stale.
    exempt-all-assignees: # optional, default is false
    # Exempt all issues with assignees from being marked as stale. Overrides exempt-all-assignees for issues.
    exempt-all-issue-assignees: # optional
    # Exempt all pull requests with assignees from being marked as stale. Overrides exempt-all-assignees for PRs.
    exempt-all-pr-assignees: # optional
    # Exempt all issues and pull requests with projects from being marked as stale.
    exempt-all-projects: # optional, default is false
    # Display some statistics at the end regarding the number of processed issues and pull requests.
    ignore-updates: # optional, default is false
    # Any time an issue or pull request is updated, reset the stale timer. Default is true.
    ignore-issue-updates: # optional
    # Any time a pull request is updated, reset the stale timer. Default is true.
    ignore-pr-updates: # optional
    # Include all the pull requests and ignore the issues in the stale workflow.
    include-only-assigned: # optional, default is false
