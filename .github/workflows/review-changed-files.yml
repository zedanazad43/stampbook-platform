name: Review Changed Files

on:
  pull_request:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        run: |
          git fetch origin $GITHUB_BASE_REF
          git diff --name-only origin/$GITHUB_BASE_REF $GITHUB_SHA > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Review changed files if present
        run: |
          while read FILE; do
            if git ls-tree -r $GITHUB_SHA --name-only | grep -q "$FILE"; then
              git show "$GITHUB_SHA:$FILE"
              # Review logic for $FILE
            else
              echo "$FILE not found in commit $GITHUB_SHA, skipping."
            fi
          done < changed_files.txt
