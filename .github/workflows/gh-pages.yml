name: نشر تلقائي للموقع على GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. أخذ الكود
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. تثبيت Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. تثبيت الحزم
      - name: Install dependencies
        run: npm ci --no-audit

      # 4. بناء المشروع (ينتج محتوى في مجلد public/)
      - name: Build project
        run: npm run build

      # 5. نشر الناتج على GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
