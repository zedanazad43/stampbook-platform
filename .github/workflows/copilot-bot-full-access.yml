name: Copilot Bot Full Access

on: [workflow_dispatch, push, pull_request]

jobs:
  copilot-access:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
      checks: write
      deployments: write
      discussions: write
      packages: write
      repository-projects: write
      security-events: write
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Copilot Agent (مثال)
        run: echo "Copilot Agent is running with full permissions"
