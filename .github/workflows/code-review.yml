name: Code Review

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review files only if present in commit
        run: |
          FILES=".dockerignore public/index.html"
          for FILE in $FILES; do
            if git ls-tree -r $GITHUB_SHA --name-only | grep -q "$FILE"; then
              git show "$GITHUB_SHA:$FILE"
              # Add your code review logic here
            else
              echo "$FILE not found in commit $GITHUB_SHA, skipping review for it."
            fi
          done
