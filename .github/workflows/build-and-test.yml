name: Build, Test, and Publish

on:
  push:
    branches: [ main, develop, 'copilot/**' ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin $GITHUB_BASE_REF
          git diff --name-only $GITHUB_BASE_REF $GITHUB_SHA > changed_files.txt

      - name: Review changed files if present
        if: github.event_name == 'pull_request'
        run: |
          while read FILE; do
            if git ls-tree -r $GITHUB_SHA --name-only | grep -q "$FILE"; then
              git show "$GITHUB_SHA:$FILE"
              # Review logic for $FILE
            else
              echo "$FILE not found in commit $GITHUB_SHA, skipping."
            fi
          done < changed_files.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile is up-to-date
        run: |
          npm install --package-lock-only --ignore-scripts 2>/dev/null
          if ! git diff --exit-code package-lock.json; then
            echo "package-lock.json is out of sync with package.json."
            echo "Run 'npm install' locally and commit the updated lockfile."
            exit 1
          fi

      - name: Run tests
        run: npm test

