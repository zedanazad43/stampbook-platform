name: Build, Test, and Publish

on:
  push:
    branches: [ main, develop, 'copilot/**' ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.COPILOT_TOKEN || github.token }}

      - name: Ensure main ref is available (for git diff/show)
        run: |
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          git show-ref --verify --quiet refs/remotes/origin/main
          # اختياري: إنشاء ref محلي باسم main إذا كان شيء يتوقع refs/heads/main
          git show-ref --quiet refs/heads/main || git branch -f main refs/remotes/origin/main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Verify lockfile is up-to-date
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit
          if ! git diff --exit-code package-lock.json; then
            echo "package-lock.json is out of sync with package.json."
            echo "Run 'npm install' locally and commit the updated lockfile."
            exit 1
          fi

      - name: Run tests
        run: npm test

