# ======================================================\n#  :     Railway\n#    Push    (main)\n# :   RAILWAY_TOKEN   GitHub\n# ======================================================\nname:    Railway\n\non:\n  push:\n    branches:\n      - main\n  #        Actions\n  workflow_dispatch:\n\njobs:\n  deploy:\n    name:    Railway\n    runs-on: ubuntu-latest\n    permissions:\n      contents: read\n\n    steps:\n      #  1:    \n      - name:  \n        uses: actions/checkout@v4\n\n      #  2:   Node.js ( 18)\n      - name:  Node.js\n        uses: actions/setup-node@v4\n        with:\n          node-version: '18'\n          cache: 'npm'\n\n      #  3:   \n      - name:  \n        run: npm ci\n\n      #  4:   Railway CLI  \n      #    RAILWAY_TOKEN  :\n      #   GitHub  Settings  Secrets  RAILWAY_TOKEN\n      #   SYNC_TOKEN  PORT   Railway\n      - name: Check Railway token\n        id: check-railway\n        env:\n          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}\n        run: |\n          if [ -n "$RAILWAY_TOKEN" ]; then\n            echo "deploy=true" >> $GITHUB_OUTPUT\n          else\n            echo "deploy=false" >> $GITHUB_OUTPUT\n            echo "RAILWAY_TOKEN is not configured, skipping deployment."\n          fi\n\n      - name:   Railway\n        if: steps.check-railway.outputs.deploy == 'true'\n        run: |\n          npm install -g @railway/cli\n          railway up --service stpclauderailway --detach\n        env:\n          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}