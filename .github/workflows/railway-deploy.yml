name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Railway token
        id: check-railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "RAILWAY_TOKEN is not configured, skipping deployment."
          fi

      - name: Deploy to Railway
        if: steps.check-railway.outputs.deploy == 'true'
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          npm install -g @railway/cli

          EXTRA_ARGS=()
          if [ -n "$RAILWAY_SERVICE_ID" ]; then
            EXTRA_ARGS+=(--service "$RAILWAY_SERVICE_ID")
          fi
          # Only pass --project and --environment together (both are required when using --project)
          if [ -n "$RAILWAY_PROJECT_ID" ] && [ -n "$RAILWAY_ENVIRONMENT" ]; then
            EXTRA_ARGS+=(--project "$RAILWAY_PROJECT_ID")
            EXTRA_ARGS+=(--environment "$RAILWAY_ENVIRONMENT")
          elif [ -n "$RAILWAY_ENVIRONMENT" ]; then
            EXTRA_ARGS+=(--environment "$RAILWAY_ENVIRONMENT")
          fi

          railway up "${EXTRA_ARGS[@]}" --detach
