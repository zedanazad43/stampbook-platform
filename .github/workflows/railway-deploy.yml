# ======================================================\n# سير عمل: نشر الخلفية تلقائياً على Railway\n# يُشغَّل عند كل Push على الفرع الرئيسي (main)\n# المتطلبات: أضف السر RAILWAY_TOKEN في إعدادات GitHub\n# ======================================================\nname: نشر الخلفية على Railway\n\non:\n  push:\n    branches:\n      - main\n  # يتيح تشغيل سير العمل يدوياً من تبويب Actions\n  workflow_dispatch:\n\njobs:\n  deploy:\n    name: نشر تلقائي على Railway\n    runs-on: ubuntu-latest\n    permissions:\n      contents: read\n\n    steps:\n      # الخطوة 1: استنساخ الكود من المستودع\n      - name: استنساخ الكود\n        uses: actions/checkout@v4\n\n      # الخطوة 2: إعداد بيئة Node.js (الإصدار 18)\n      - name: إعداد Node.js\n        uses: actions/setup-node@v4\n        with:\n          node-version: '18'\n          cache: 'npm'\n\n      # الخطوة 3: تثبيت حزم المشروع\n      - name: تثبيت الحزم\n        run: npm ci\n\n      # الخطوة 4: تثبيت أداة Railway CLI ونشر المشروع\n      # تأكد من إضافة RAILWAY_TOKEN كسر في:\n      #   GitHub → Settings → Secrets → RAILWAY_TOKEN\n      # كذلك أضف SYNC_TOKEN و PORT في لوحة Railway\n      - name: Check Railway token\n        id: check-railway\n        env:\n          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}\n        run: |\n          if [ -n "$RAILWAY_TOKEN" ]; then\n            echo "deploy=true" >> $GITHUB_OUTPUT\n          else\n            echo "deploy=false" >> $GITHUB_OUTPUT\n            echo "RAILWAY_TOKEN is not configured, skipping deployment."\n          fi\n\n      - name: نشر على Railway\n        if: steps.check-railway.outputs.deploy == 'true'\n        env:\n          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}\n          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}\n          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}\n        run: |\n          npm install -g @railway/cli\n          railway up --detach --project "$RAILWAY_PROJECT_ID" --service "$RAILWAY_SERVICE_ID" 