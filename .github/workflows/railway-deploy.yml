# ======================================================\n# سير عمل: نشر الخلفية تلقائياً على Railway\n# يُشغَّل عند كل Push على الفرع الرئيسي (main)\n# الأسرار المطلوبة في GitHub → Settings → Secrets:\n#   RAILWAY_TOKEN      - رمز المصادقة الخاص بـ Railway (مطلوب)\n#   RAILWAY_SERVICE_ID - معرّف الخدمة في Railway (يُوصى به لتجنب خطأ "Multiple services")\n#   RAILWAY_PROJECT_ID - معرّف المشروع في Railway (اختياري)\n#   RAILWAY_ENVIRONMENT - اسم البيئة المستهدفة (production أو staging... إلخ)\n# كذلك أضف SYNC_TOKEN و PORT في لوحة Railway\n# ======================================================\nname: نشر الخلفية على Railway\n\non:\n  push:\n    branches:\n      - main\n  # يتيح تشغيل سير العمل يدوياً من تبويب Actions\n  workflow_dispatch:\n\n# منع تشغيل نشرَين في نفس الوقت؛ يُلغي النشر القديم إن وُجد\nconcurrency:\n  group: railway-deploy-${{ github.ref }}\n  cancel-in-progress: true\n\njobs:\n  deploy:\n    name: نشر تلقائي على Railway\n    runs-on: ubuntu-latest\n    permissions:\n      contents: read\n\n    steps:\n      # الخطوة 1: استنساخ الكود من المستودع (بدون وحدات فرعية)\n      - name: استنساخ الكود\n        uses: actions/checkout@v4\n        with:\n          submodules: false\n\n      # الخطوة 2: إعداد بيئة Node.js (الإصدار 18)\n      - name: إعداد Node.js\n        uses: actions/setup-node@v4\n        with:\n          node-version: '18'\n          cache: 'npm'\n\n      # الخطوة 3: تثبيت حزم المشروع\n      - name: تثبيت الحزم\n        run: npm ci\n\n      # الخطوة 4: التحقق من وجود رمز Railway\n      # تأكد من إضافة RAILWAY_TOKEN كسر في:\n      #   GitHub → Settings → Secrets → RAILWAY_TOKEN\n      - name: Check Railway token\n        id: check-railway\n        env:\n          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}\n        run: |\n          if [ -n "$RAILWAY_TOKEN" ]; then\n            echo "deploy=true" >> $GITHUB_OUTPUT\n          else\n            echo "deploy=false" >> $GITHUB_OUTPUT\n            echo "RAILWAY_TOKEN is not configured, skipping deployment."\n          fi\n\n      # الخطوة 5: تثبيت Railway CLI ونشر المشروع\n      # يستخدم RAILWAY_SERVICE_ID لتحديد الخدمة بدقة (يتجنب خطأ "Multiple services found")\n      # يستخدم RAILWAY_PROJECT_ID لتحديد المشروع إن توفّر\n      # يستخدم RAILWAY_ENVIRONMENT لتحديد البيئة المطلوبة\n      - name: نشر على Railway\n        if: steps.check-railway.outputs.deploy == 'true'\n        env:\n          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}\n          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}\n          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}\n          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}\n        run: |\n          npm install -g @railway/cli\n\n          EXTRA_ARGS=()\n          if [ -n "$RAILWAY_SERVICE_ID" ]; then\n            EXTRA_ARGS+=(--service "$RAILWAY_SERVICE_ID")\n          fi\n          if [ -n "$RAILWAY_PROJECT_ID" ]; then\n            EXTRA_ARGS+=(--project "$RAILWAY_PROJECT_ID")\n          fi\n          if [ -n "$RAILWAY_ENVIRONMENT" ]; then\n            EXTRA_ARGS+=(--environment "$RAILWAY_ENVIRONMENT")\n          fi\n\n          railway up "${EXTRA_ARGS[@]}" --detach\n