name: Build Mobile App (Android APK)

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-build.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - all

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Check for mobile project
        id: check-mobile
        run: |
          if [ -f mobile/package.json ]; then
            echo "has_mobile=true" >> $GITHUB_OUTPUT
          else
            echo "has_mobile=false" >> $GITHUB_OUTPUT
            echo "No mobile/ directory found — skipping native build."
          fi

      - name: Install Expo CLI
        if: steps.check-mobile.outputs.has_mobile == 'true'
        run: npm install -g @expo/cli eas-cli

      - name: Install mobile dependencies
        if: steps.check-mobile.outputs.has_mobile == 'true'
        working-directory: mobile
        run: npm ci

      - name: Build Android APK with Expo
        if: steps.check-mobile.outputs.has_mobile == 'true'
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            eas build --platform android --profile preview --non-interactive --no-wait
          else
            echo "EXPO_TOKEN not set — skipping EAS cloud build."
            echo "To enable APK builds, add EXPO_TOKEN to repository secrets."
          fi

      - name: Upload APK artifact
        if: steps.check-mobile.outputs.has_mobile == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stampcoin-android-apk
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: ignore
          retention-days: 30

  # Placeholder job for iOS (requires macOS runner and Apple certificates)
  build-ios-info:
    name: iOS Build Info
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: iOS build requirements
        run: |
          echo "=== iOS Build Requirements ==="
          echo "iOS builds require:"
          echo "  1. macOS runner (runs-on: macos-latest)"
          echo "  2. Apple Developer account (certificates & provisioning profiles)"
          echo "  3. Expo EAS account with EXPO_TOKEN secret configured"
          echo ""
          echo "To enable iOS builds:"
          echo "  1. Create an Expo account at https://expo.dev"
          echo "  2. Add EXPO_TOKEN to repository secrets"
          echo "  3. Configure app.json with your bundle identifier"
          echo "  4. Run: eas build --platform ios"
