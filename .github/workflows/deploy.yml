name: نشر شامل Multi-language Deployment

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  deploy:
    runs-on: github-latest

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v3

      ### Node.js ###
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Node.js dependencies
        if: ${{ env.USE_NODE == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: npm install
        continue-on-error: true

      - name: Build Node.js app
        if: ${{ env.USE_NODE == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: npm run build
        continue-on-error: true

      ### Python ###
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: ${{ env.USE_PYTHON == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: pip install -r requirements.txt
        continue-on-error: true

      - name: Build Python project
        if: ${{ env.USE_PYTHON == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: python setup.py build || echo "no build step"
        continue-on-error: true

      ### Java ###
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Java project
        if: ${{ env.USE_JAVA == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: mvn install || echo "no build step"
        continue-on-error: true

      ### PHP ###
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install PHP dependencies
        if: ${{ env.USE_PHP == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: composer install --prefer-dist --no-progress --no-suggest
        continue-on-error: true

      ### Ruby ###
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Ruby dependencies
        if: ${{ env.USE_RUBY == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: bundle install
        continue-on-error: true

      - name: Build Ruby app
        if: ${{ env.USE_RUBY == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: bundle exec rake build || echo "no build step"
        continue-on-error: true

      ### Go ###
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Go dependencies
        if: ${{ env.USE_GO == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: go mod download
        continue-on-error: true

      - name: Build Go project
        if: ${{ env.USE_GO == 'true' || steps.checkout.outputs.exists == 'true' }}
        run: go build ./...
        continue-on-error: true

      ### Cloudflare Wrangler ###
      - name: Setup Wrangler
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != 'cf48cfb41422fa4ff25991f72a536da38c490' }}
        uses: cloudflare/wrangler-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != 'cf48cfb41422fa4ff25991f72a536da38c490' }}
        run: npx wrangler pages deploy public --project-name stampcoin-platform
        continue-on-error: true

      - name: Deploy to Cloudflare Workers
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != 'cf48cfb41422fa4ff25991f72a536da38c490' }}
        run: npx wrangler deploy --env production
        continue-on-error: true

      ### Upload Build Artifacts ###
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-artifact
          path: |
            public
            dist
            build
            target
            vendor
            .next
            .output
            ./bin
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6
          overwrite: false
          include-hidden-files: false
