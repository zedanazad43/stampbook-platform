name: Stampcoin Platform — All Agents

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: stampcoin-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────
  # 1. Copilot Setup Steps
  # ──────────────────────────────────────────────
  copilot-setup-steps:
    name: Copilot Setup Steps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install project dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Copilot setup complete
        run: echo "Copilot setup steps completed!"

  # ──────────────────────────────────────────────
  # 2. Build and Test
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile is up-to-date
        run: |
          npm install --package-lock-only --ignore-scripts
          if ! git diff --exit-code package-lock.json; then
            echo "package-lock.json is out of sync with package.json."
            echo "Run 'npm install' locally and commit the updated lockfile."
            exit 1
          fi

      - name: Run tests
        run: npm test


