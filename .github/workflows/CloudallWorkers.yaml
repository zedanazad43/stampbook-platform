name: Cloudall Workers\n\n"on":\n  push:\n    branches:\n      - main\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v2\n      - name: Install wrangler\n        run: npm install -g wrangler@4.71.0\n      - name: Check wrangler version\n        run: npx --yes --no-install wrangler --version\n