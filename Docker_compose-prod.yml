# docker-compose.prod.yml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stampcoin-app
    restart: always
    ports:
      - "127.0.0.1:3000:3000"  # متاح محلياً فقط (Nginx سيتولى التوجيه)
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://stampcoin_user:stampcoin_pass@mysql:3306/stampcoin
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - OAUTH_SERVER_URL=https://auth.ecostamp.net
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - stampcoin-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: stampcoin-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=stampcoin
      - MYSQL_USER=stampcoin_user
      - MYSQL_PASSWORD=stampcoin_pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - stampcoin-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: stampcoin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - stampcoin-net

networks:
  stampcoin-net:
    driver: bridge

volumes:
  mysql_
