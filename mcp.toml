mcp_version = "1.1"
agent_id = "copilot-agent-azad-001"
description = "Copilot MCP policy – connects local workspace, all repos (GitHub/GitLab), cloud providers (AWS/GCP/Azure/Cloudflare), databases, Docker/K8s, and AI-memory tools so agents share context, cut redundant token usage, and complete tasks faster."
owner = "AzadZedan"

allowed_repositories = [
  "zedanazad43/stp",
  "Stampcoin-platform/stampcoin-platform"
]

# ---------------------------------------------------------------------------
# MCP Servers  (runtime config: .github/copilot/mcp.json  &  .vscode/mcp.json)
# ---------------------------------------------------------------------------

[[mcp_servers]]
id = "filesystem"
package = "@modelcontextprotocol/server-filesystem"
transport = "stdio"
purpose = "Read/write local workspace files – avoids full-file re-uploads each turn"

[[mcp_servers]]
id = "git"
package = "@modelcontextprotocol/server-git"
transport = "stdio"
purpose = "Git log, diff, blame, show inside the local repo"

[[mcp_servers]]
id = "github"
package = "@modelcontextprotocol/server-github"
transport = "stdio"
purpose = "GitHub issues, PRs, code search, Actions, releases across all permitted repos"
auth_env = "GITHUB_PERSONAL_ACCESS_TOKEN"

[[mcp_servers]]
id = "gitlab"
package = "@modelcontextprotocol/server-gitlab"
transport = "stdio"
purpose = "GitLab repos, MRs, pipelines, packages"
auth_env = "GITLAB_PERSONAL_ACCESS_TOKEN"

[[mcp_servers]]
id = "memory"
package = "@modelcontextprotocol/server-memory"
transport = "stdio"
purpose = "Persistent cross-session memory – stores summaries and decisions to reduce repeated context tokens"

[[mcp_servers]]
id = "fetch"
package = "@modelcontextprotocol/server-fetch"
transport = "stdio"
purpose = "On-demand external URL retrieval (docs, changelogs, APIs)"

[[mcp_servers]]
id = "aws"
package = "@modelcontextprotocol/server-aws-kb-retrieval-server"
transport = "stdio"
purpose = "AWS Bedrock Knowledge Base retrieval for runbooks and indexed docs"
auth_env = "AWS_ACCESS_KEY_ID"

[[mcp_servers]]
id = "cloudflare"
package = "@cloudflare/mcp-server-cloudflare"
transport = "stdio"
purpose = "Cloudflare Workers, KV, D1, R2, Pages, and AI Gateway"
auth_env = "CLOUDFLARE_API_TOKEN"

[[mcp_servers]]
id = "postgres"
package = "@modelcontextprotocol/server-postgres"
transport = "stdio"
purpose = "Schema introspection and read-only SQL queries"
auth_env = "POSTGRES_CONNECTION_STRING"

[[mcp_servers]]
id = "sqlite"
package = "@modelcontextprotocol/server-sqlite"
transport = "stdio"
purpose = "Local SQLite for development and offline testing"

[[mcp_servers]]
id = "docker"
package = "mcp-server-docker"
transport = "stdio"
purpose = "List containers, inspect images, read logs, run docker-compose"

[[mcp_servers]]
id = "kubernetes"
package = "mcp-server-kubernetes"
transport = "stdio"
purpose = "Kubernetes cluster introspection: pods, deployments, services, config-maps"
auth_env = "KUBECONFIG"

# ---------------------------------------------------------------------------
# Token optimisation
# ---------------------------------------------------------------------------

[token_optimization]
enable_server_side_caching = true
cache_ttl_seconds = 300
max_response_tokens_per_tool_call = 4096
prefer_diff_over_full_file = true
parallel_tool_calls = true
memory_server_auto_summarize = true
memory_server_summarize_threshold_tokens = 8192
suppress_unchanged_file_reads = true

# ---------------------------------------------------------------------------
# Branch & action policy
# ---------------------------------------------------------------------------

[branch_restrictions]
protected_branches = ["main", "release/*"]
can_create_branches = true
can_delete_protected_branches = false

[allowed_actions]
read_code = true
create_branch = true
create_pr = true
comment_pr = true
modify_docs = true
run_ci_jobs = true
deploy_nonprod = true
merge_pr = false
direct_push_to_protected = false
modify_repo_settings = false
access_secrets = "vault_scoped"

[approval_requirements.merge_to_main]
required_approvals = 2
required_checks = ["unit_tests", "integration_tests", "sast_scan"]
allow_human_override = false

[approval_requirements.deploy_production]
required_approvals = 3
incident_blockers = ["critical_vuln", "failing_smoke"]
allow_human_override = false

# ---------------------------------------------------------------------------
# Account integrations
# ---------------------------------------------------------------------------

[[account_integrations]]
name = "github"
type = "github_app"
auth_method = "github_app_private_key_via_vault"
notes = "Install on allowed_repositories only. Use installation tokens with narrow scope."

[[account_integrations]]
name = "gitlab"
type = "oauth_app_or_token"
auth_method = "oauth_vaulted"
notes = "Grant read_repository and write_repository only when needed; prefer bot account."

[[account_integrations]]
name = "codegeex"
type = "third_party_api"
auth_method = "oauth_or_api_key_vaulted"
notes = "Use inference-only scope; do not permit model-management or billing scopes."

[[account_integrations]]
name = "aws"
type = "cloud_provider"
auth_method = "role_assumption_via_oidc_or_sts"
notes = "Use least-privilege IAM roles and avoid long-lived keys."

[[account_integrations]]
name = "gcp"
type = "cloud_provider"
auth_method = "service_account_key_via_vault_or_workload_identity"
notes = "Prefer Workload Identity where possible."

[[account_integrations]]
name = "azure"
type = "cloud_provider"
auth_method = "managed_identity_or_service_principal_via_vault"
notes = "Use Azure Managed Identity in hosted environments; service principal with RBAC least-privilege elsewhere."

[[account_integrations]]
name = "cloudflare"
type = "cloud_provider"
auth_method = "api_token_via_vault"
notes = "Scope token to specific zones and services only."

# ---------------------------------------------------------------------------
# Secrets, logging, revocation
# ---------------------------------------------------------------------------

[secret_handling]
method = "vault"
vault_paths_allowed = ["secret/data/stampcoin/*", "transit/keys/stampcoin-agent"]
rotation_policy_hours = 24
no_secrets_in_repo = true

[logging_and_audit]
log_destination = "centralized_log_service"
events_to_log = ["all_actions", "token_issuance", "approval_decisions", "secret_access"]
retain_days = 90

[revocation]
immediate_revoke_procedure = [
  "revoke_vault_tokens_for_agent",
  "disable_github_app_installation",
  "remove_iam_role_trust_from_agent"
]

onboarding_steps = [
  "create_github_app_and_store_private_key_in_vault",
  "create_vault_policy_and_approle_for_agent",
  "install_app_on_allowed_repos",
  "run_npm_install_to_pull_mcp_server_packages",
  "set_required_env_vars_listed_in_mcp_servers",
  "test_agent_in_sandbox_repo",
  "enable_branch_protections_and_required_checks"
]

[risk_assessment]
max_risk_level_for_agent_actions = "medium"
actions_triggering_incident = ["merge_to_main", "deploy_production"]