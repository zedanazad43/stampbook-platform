syntax = "proto3";

package stp.billing.v1;

option go_package = "github.com/zedanazad43/stp/proto/billing/v1";

// UsageEvent represents a single metered usage event.
message UsageEvent {
  string account_id = 1;
  string sku = 2;
  int64 quantity = 3;
  int64 recorded_at_unix = 4;
}

// UsageIngestionService exposes endpoints for recording metered usage.
service UsageIngestionService {
  rpc IngestUsage(IngestUsageRequest) returns (IngestUsageResponse);
}

message IngestUsageRequest {
  UsageEvent event = 1;
}

message IngestUsageResponse {
  bool accepted = 1;
}
