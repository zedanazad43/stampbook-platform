name: CI/CD Deploy to Railway & Cloudflare

on:
  push:
    branches:
      - main

jobs:
  build-test-healthcheck-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: |
          docker build -t myapp .

      - name: Run container and verify healthcheck
        run: |
          docker run -d --name temp-app -p 8080:8080 myapp
          timeout 90 bash -c 'until curl -fsSL http://localhost:8080/health; do sleep 3; done'
          docker stop temp-app

      - name: Deploy to Railway (with CLI)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g railway
          railway up --ci

      # Optional: Deploy static frontend to Cloudflare Pages or Workers if needed
