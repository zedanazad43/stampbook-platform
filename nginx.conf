# nginx.conf
events { worker_connections 1024; }

http {
    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name ecostamp.net www.ecostamp.net api.ecostamp.net;
        return 301 https://$host$request_uri;
    }

    # Frontend (Cloudflare Pages أو نفس الخادم)
    server {
        listen 443 ssl http2;
        server_name ecostamp.net www.ecostamp.net;

        ssl_certificate /etc/letsencrypt/live/ecostamp.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ecostamp.net/privkey.pem;

        root /var/www/frontend;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API
    server {
        listen 443 ssl http2;
        server_name api.ecostamp.net;

        ssl_certificate /etc/letsencrypt/live/api.ecostamp.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ecostamp.net/privkey.pem;

        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
        }

        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
        limit_req zone=api burst=20 nodelay;
    }
}
