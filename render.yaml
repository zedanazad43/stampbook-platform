services:
  - type: web
    name: stampbook-platform
    runtime: node
    repo: https://github.com/zedanazad43/stp
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    autoDeploy: true
    healthCheckPath: /api/status
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 18.17.0
