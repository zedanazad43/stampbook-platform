# Render configuration for Stampcoin Platform
# This file defines the service configuration for Render

services:
  - type: web
    name: stampcoin-platform
    env: node
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_URL
        sync: false
      - key: CANONICAL_HOST
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      # Add any additional environment variables required by your app
      # - key: SYNC_TOKEN
      #   value: your-sync-token-here
      # - key: BASE_URL
      #   value: https://your-service-name.onrender.com
    healthCheck:
      path: /health
      interval: 30s
      timeout: 3s
      method: GET
      retries: 3
