# Render configuration for Stampcoin Platform
# This file defines the service configuration for Render

services:
  - type: web
    name: stampcoin-platform
    env: node
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_URL
        sync: false
      - key: CANONICAL_HOST
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      # Add any additional environment variables required by your app
      # - key: SYNC_TOKEN
      #   value: your-sync-token-here
      # BASE_URL example: https://app.yourdomain.com
      # CANONICAL_HOST example: app.yourdomain.com
      # ALLOWED_ORIGINS example: https://app.yourdomain.com,https://www.yourdomain.com
    # healthCheckPath uses Render native Node.js health check (no dockerfilePath)
    healthCheckPath: /health
